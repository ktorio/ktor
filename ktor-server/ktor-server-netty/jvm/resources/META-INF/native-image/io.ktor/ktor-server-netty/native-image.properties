# GraalVM Native Image configuration for Ktor Server Netty
#
# This file adds:
# 1. SharedArenaSupport for Netty byte buffer pooling with MemorySegment
# 2. Additional runtime initializations for native transport classes not covered
#    by Netty's default configs (kqueue transport, HTTP/2 handlers with ByteBuf statics)
#
# Reference: https://www.graalvm.org/latest/reference-manual/native-image/metadata/
#
# KQUEUE TRANSPORT:
#   macOS/BSD native transport using kqueue. Loads libnetty_transport_native_kqueue
#   via JNI. Not included in Netty's default metadata.
#
# HTTP/2 HANDLERS:
#   CleartextHttp2ServerUpgradeHandler has static ByteBuf fields that reference
#   runtime-init buffer classes. Must be initialized at runtime to avoid conflicts.

Args=-H:+UnlockExperimentalVMOptions \
       -H:+SharedArenaSupport \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueue \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueueEventLoop \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueueEventArray \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueueServerSocketChannel \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueueSocketChannel \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueueServerDomainSocketChannel \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueueDomainSocketChannel \
       --initialize-at-run-time=io.netty.channel.kqueue.KQueueDatagramChannel \
       --initialize-at-run-time=io.netty.channel.kqueue.Native \
       --initialize-at-run-time=io.netty.handler.ssl.BouncyCastleAlpnSslUtils \
       --initialize-at-run-time=io.netty.handler.codec.http2.CleartextHttp2ServerUpgradeHandler
