name: DevContainer
on:
  pull_request:
    branches: [ main ]
    paths:
      - .devcontainer/**
      - .github/workflows/devcontainer.yml
      - gradle/libs.versions.toml

  push:
    branches: [ main ]
    paths:
      - .devcontainer/**
      - .github/workflows/devcontainer.yml
      - gradle/libs.versions.toml

  schedule:
    - cron: '0 0 * * 6' # Every Saturday at 00:00

  # Allow running manually
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ktorio/devcontainer

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write

    env:
      # If the event is a "pull_request", just test the image builds successfully and do not push it
      PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            latest
            {{date 'YYYYMMDD'}}

      - name: Extract toolchain versions
        id: versions
        run: |
          set -euo pipefail
          # Reads version from .gradle/libs.versions.toml and outputs it as a step result
          function read_version() {
            local alias=$1
            # Format: alias = "X.Y.Z"
            local version=$(grep -E "^$alias = \"" gradle/libs.versions.toml | cut -d'"' -f2)
            echo "$alias=$version" | tee --append "$GITHUB_OUTPUT"
          }
          read_version node
          read_version yarn
      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          push: ${{ env.PUSH_IMAGE }}
          context: .devcontainer
          target: dev
          build-args: |
            node_version=${{ steps.versions.outputs.node }}
            yarn_version=${{ steps.versions.outputs.yarn }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        if: ${{ env.PUSH_IMAGE == 'true' }}
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
